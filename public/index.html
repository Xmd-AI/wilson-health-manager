<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>肝豆健康管家</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="header" id="appHeader">
    <div>
      <div class="header-title" id="pageTitle">肝豆健康管家</div>
      <div class="header-sub">肝豆状核变性 · 智能健康管家</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="headerUsername" style="font-size:13px;display:none;"></span>
      <span id="logoutBtn" style="font-size:13px;cursor:pointer;display:none;" onclick="App.logout()">退出</span>
    </div>
  </div>

  <div class="main-content" id="content"></div>

  <div class="bottom-nav" id="bottomNav" style="display:none;">
    <button class="nav-item" data-route="/dashboard" onclick="App.go('/dashboard')"><span class="nav-icon">🏠</span>首页</button>
    <button class="nav-item" data-route="/diet" onclick="App.go('/diet')"><span class="nav-icon">🍚</span>饮食</button>
    <button class="nav-item" data-route="/medication" onclick="App.go('/medication')"><span class="nav-icon">💊</span>用药</button>
    <button class="nav-item" data-route="/tests" onclick="App.go('/tests')"><span class="nav-icon">📊</span>检查</button>
    <button class="nav-item" data-route="/more" onclick="App.showMoreMenu()"><span class="nav-icon">📋</span>更多</button>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
